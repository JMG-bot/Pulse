<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSE — Goal Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&family=Exo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#090b10; --bg1:#0e1118; --bg2:#141720; --bg3:#1c2030;
  --border:#252a38; --border-bright:#353d52;
  --text:#e8ecf5; --text-dim:#7a8299; --text-faint:#3d4459;
  --g0:#00f5a0; --g1:#00d4ff; --g2:#ff6b35; --g3:#f7c948;
  --g4:#c77dff; --g5:#ff4d6d; --g6:#4af7c4; --g7:#ffb347;
  --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg0);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);pointer-events:none;z-index:1000;}

/* NAV */
nav{background:var(--bg1);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;padding:0 2rem;position:sticky;top:0;z-index:200;}
.brand{font-family:'Exo 2',sans-serif;font-weight:800;font-size:1.25rem;letter-spacing:0.18em;margin-right:3rem;}
.brand-dot{color:var(--g0);}
.nav-tabs{display:flex;flex:1;}
.nav-tab{font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);padding:0 1.1rem;height:58px;display:flex;align-items:center;cursor:pointer;border-bottom:2px solid transparent;transition:color .18s,border-color .18s;user-select:none;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--g1);border-bottom-color:var(--g1);}
.manage-btn{margin-left:auto;background:var(--bg3);border:1px solid var(--border-bright);border-radius:var(--radius-sm);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.4rem 1rem;cursor:pointer;transition:all .18s;}
.manage-btn:hover{border-color:var(--g0);color:var(--g0);}

/* MAIN */
main{padding:2rem;max-width:1200px;margin:0 auto;}
.view{display:none;animation:fadeIn .25s ease;}
.view.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* DATE HEADER */
.date-header{display:flex;align-items:center;gap:1.25rem;margin-bottom:2.5rem;}
.date-day{font-family:'Exo 2',sans-serif;font-size:3.5rem;font-weight:900;line-height:1;flex-shrink:0;}
.date-meta{font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--text-dim);line-height:1.9;display:flex;flex-direction:column;justify-content:center;}
.weekday{color:var(--g1);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;}

/* SECTION LABEL */
.section-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-faint);margin-bottom:1rem;display:flex;align-items:center;gap:0.6rem;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* DAILY GOAL TILES */
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2.5rem;}
.goal-tile{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem 1.2rem;cursor:pointer;transition:all .22s cubic-bezier(.34,1.4,.64,1);position:relative;overflow:hidden;user-select:none;min-height:120px;display:flex;flex-direction:column;justify-content:space-between;}
.goal-tile:hover:not(.done){transform:translateY(-3px);border-color:var(--border-bright);}
.goal-tile.done{transform:translateY(-2px);border-color:transparent;}
.goal-tile-icon{font-size:1.6rem;margin-bottom:0.5rem;display:block;}
.goal-tile-name{font-weight:700;font-size:0.95rem;line-height:1.2;}
.goal-tile.done .goal-tile-name{color:#000;}
.goal-tile-freq{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.08em;color:var(--text-faint);margin-top:0.3rem;}
.goal-tile.done .goal-tile-freq{color:rgba(0,0,0,0.45);}
.goal-tile-status{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;margin-top:0.8rem;color:var(--text-dim);}
.goal-tile.done .goal-tile-status{color:rgba(0,0,0,0.6);}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.08) translateY(-4px)}70%{transform:scale(.97) translateY(-2px)}100%{transform:scale(1) translateY(-2px)}}
.goal-tile.popping{animation:pop .35s cubic-bezier(.34,1.56,.64,1) forwards;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0.75rem;margin-bottom:2.5rem;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:600;line-height:1;margin-bottom:0.3rem;}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);}
.progress-bar-wrap{background:var(--bg3);border-radius:99px;height:4px;overflow:hidden;margin-top:0.8rem;}
.progress-bar-fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.34,1.2,.64,1);}

/* WEEKLY TABLE */
.week-table-wrap{overflow-x:auto;margin-bottom:1.5rem;}
.week-table{width:100%;border-collapse:separate;border-spacing:4px;min-width:600px;}
.week-table th{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-faint);padding:0.5rem 0.4rem;text-align:center;font-weight:400;}
.week-table th.goal-col{text-align:left;min-width:150px;color:var(--text-dim);font-size:0.65rem;}
.week-table td{text-align:center;padding:4px;}
.week-table td.goal-label{text-align:left;padding:0.5rem 0.5rem;font-size:0.85rem;font-weight:600;white-space:nowrap;vertical-align:middle;}
.goal-label-sub{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--text-faint);margin-top:2px;font-weight:400;}
.week-cell{width:46px;height:46px;border-radius:var(--radius-sm);background:var(--bg2);border:1px solid var(--border);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;position:relative;}
.week-cell:hover:not(.future){border-color:var(--border-bright);transform:scale(1.1);}
.week-cell.done{border-color:transparent;color:#000;font-weight:700;}
.week-cell.today-col:not(.done){border-color:var(--g1);box-shadow:0 0 0 1px var(--g1);}
.week-cell.future{opacity:0.25;cursor:default;pointer-events:none;}
.today-th{color:var(--g1) !important;}
.edit-hint{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--text-faint);margin-bottom:1rem;letter-spacing:0.06em;}
.edit-hint span{color:var(--g3);}
/* week freq progress */
.week-freq-bar{display:flex;align-items:center;gap:0.6rem;padding:0.3rem 0.5rem;}
.week-freq-pips{display:flex;gap:3px;}
.week-freq-pip{width:10px;height:10px;border-radius:2px;background:var(--bg3);border:1px solid var(--border);}
.week-freq-pip.filled{border-color:transparent;}
.week-freq-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--text-dim);}

/* MONTHLY */
.month-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;}
.month-nav-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);font-size:1rem;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.month-nav-btn:hover{border-color:var(--border-bright);color:var(--text);}
.month-title{font-family:'JetBrains Mono',monospace;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);}
.goal-month-block{margin-bottom:2.5rem;}
.goal-section-title{font-size:0.9rem;font-weight:700;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.yearly-stat{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-dim);margin-left:auto;}
.month-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:0.6rem;}
.month-day-hdr{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);text-align:center;padding:0.3rem 0;}
.month-cell{aspect-ratio:1;border-radius:4px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-dim);min-height:28px;}
.month-cell.done{border-color:transparent;color:#000;font-weight:600;}
.month-cell.today-cell{outline:2px solid var(--g1);outline-offset:1px;}
.month-cell.empty{background:transparent;border-color:transparent;}
.month-cell.future{opacity:0.2;}
.freq-badge{display:inline-flex;align-items:center;gap:0.3rem;background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:0.15rem 0.55rem;font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--text-dim);margin-left:0.3rem;}

/* YEARLY */
.yearly-goal-section{margin-bottom:2.5rem;}
.yearly-goal-title{font-size:0.9rem;font-weight:700;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.year-grid{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,12px);gap:2px;overflow-x:auto;padding-bottom:4px;}
.year-cell{width:12px;height:12px;border-radius:2px;background:var(--bg3);transition:transform .1s;cursor:default;position:relative;}
.year-cell:hover{transform:scale(1.5);z-index:10;}
.year-cell[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg0);border:1px solid var(--border-bright);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.6rem;white-space:nowrap;padding:3px 7px;border-radius:4px;z-index:50;pointer-events:none;}
.year-cell.today-year{outline:1px solid #fff;outline-offset:1px;}

/* MODAL BASE */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg1);border:1px solid var(--border-bright);border-radius:14px;padding:2rem;width:100%;max-width:480px;animation:fadeIn .2s ease;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.modal-header h2{font-size:1.2rem;font-weight:800;letter-spacing:0.04em;}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:1.3rem;cursor:pointer;transition:color .15s;line-height:1;}
.modal-close:hover{color:var(--text);}

/* GOAL LIST IN MODAL */
.goal-list{list-style:none;margin-bottom:1.5rem;}
.goal-list-item{display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0;border-bottom:1px solid var(--border);}
.goal-list-item:last-child{border-bottom:none;}
.goal-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.goal-list-icon{font-size:1.1rem;}
.goal-list-name{flex:1;font-size:0.88rem;font-weight:600;}
.goal-list-freq-badge{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--text-faint);white-space:nowrap;}
.goal-edit-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);cursor:pointer;font-size:0.75rem;padding:0.25rem 0.55rem;transition:all .15s;white-space:nowrap;}
.goal-edit-btn:hover{border-color:var(--g1);color:var(--g1);}
.goal-remove{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:1rem;transition:color .15s;padding:0.2rem;}
.goal-remove:hover{color:var(--g5);}

/* FORM */
.add-goal-form{display:flex;flex-direction:column;gap:0.75rem;}
.add-goal-row{display:flex;gap:0.5rem;}
.form-label{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.3rem;display:block;}
.goal-input{background:var(--bg3);border:1px solid var(--border-bright);border-radius:var(--radius-sm);color:var(--text);font-family:'Syne',sans-serif;font-size:0.9rem;padding:0.6rem 0.9rem;flex:1;outline:none;transition:border-color .15s;}
.goal-input:focus{border-color:var(--g1);}
.emoji-input{width:60px;text-align:center;font-size:1.1rem;}
.color-swatches{display:flex;gap:0.4rem;flex-wrap:wrap;}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.color-swatch:hover{transform:scale(1.2);}
.color-swatch.selected{border-color:#fff;transform:scale(1.15);}

/* FREQUENCY SELECTOR */
.freq-selector{display:flex;flex-direction:column;gap:0.5rem;}
.freq-options{display:flex;gap:0.5rem;flex-wrap:wrap;}
.freq-opt{background:var(--bg3);border:1px solid var(--border-bright);border-radius:var(--radius-sm);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.08em;padding:0.4rem 0.75rem;cursor:pointer;transition:all .15s;user-select:none;}
.freq-opt:hover{border-color:var(--border-bright);color:var(--text);}
.freq-opt.selected{border-color:var(--g1);color:var(--g1);background:rgba(0,212,255,0.07);}
.freq-custom-row{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.freq-num-input{width:56px;text-align:center;font-family:'JetBrains Mono',monospace;}
.freq-unit-select{background:var(--bg3);border:1px solid var(--border-bright);border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.75rem;padding:0.55rem 0.7rem;cursor:pointer;outline:none;transition:border-color .15s;}
.freq-unit-select:focus{border-color:var(--g1);}
.freq-preview{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--g3);padding:0.4rem 0.6rem;background:rgba(247,201,72,0.07);border:1px solid rgba(247,201,72,0.2);border-radius:var(--radius-sm);}

/* FORM BUTTONS */
.form-btn-row{display:flex;gap:0.5rem;}
.add-btn{background:var(--g1);border:none;border-radius:var(--radius-sm);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;padding:0.65rem 1.2rem;cursor:pointer;transition:opacity .15s;letter-spacing:0.05em;flex:1;}
.add-btn:hover{opacity:0.85;}
.cancel-btn{background:var(--bg3);border:1px solid var(--border-bright);border-radius:var(--radius-sm);color:var(--text-dim);font-family:'Syne',sans-serif;font-size:0.85rem;padding:0.65rem 1rem;cursor:pointer;transition:all .15s;}
.cancel-btn:hover{border-color:var(--border-bright);color:var(--text);}

/* EDIT FORM (inline in modal) */
.edit-form-wrap{background:var(--bg2);border:1px solid var(--border-bright);border-radius:var(--radius);padding:1.2rem;margin-bottom:1rem;animation:fadeIn .18s ease;}
.edit-form-title{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--g1);margin-bottom:1rem;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text-dim);}
.empty-icon{font-size:3rem;margin-bottom:1rem;}
.empty-title{font-size:1.1rem;font-weight:700;margin-bottom:0.5rem;}
.empty-sub{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text-faint);}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg0);}
::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px;}
</style>
</head>
<body>

<nav>
  <div class="brand">PULSE<span class="brand-dot">.</span></div>
  <div class="nav-tabs">
    <div class="nav-tab active" data-view="daily">Daily</div>
    <div class="nav-tab" data-view="weekly">Weekly</div>
    <div class="nav-tab" data-view="monthly">Monthly</div>
    <div class="nav-tab" data-view="yearly">Yearly</div>
  </div>
  <button class="manage-btn" id="manageBtn">＋ Goals</button>
</nav>

<main>
  <div class="view active" id="view-daily">
    <div class="date-header">
      <div class="date-day" id="dayNum"></div>
      <div class="date-meta">
        <div class="weekday" id="weekdayName"></div>
        <div id="monthYear"></div>
      </div>
    </div>
    <div class="section-label">Today's Goals</div>
    <div class="goals-grid" id="dailyGrid"></div>
    <div class="stats-row" id="dailyStats"></div>
  </div>

  <div class="view" id="view-weekly">
    <div style="margin-bottom:1.5rem">
      <div class="section-label" style="margin-bottom:0.3rem">This Week</div>
      <div id="weekRangeLabel" style="font-size:1.1rem;font-weight:700;"></div>
    </div>
    <div class="edit-hint">Click any cell for today or past days to toggle. <span>Future days are locked.</span> Progress bars reflect each goal's target frequency.</div>
    <div class="week-table-wrap">
      <table class="week-table" id="weekTable"></table>
    </div>
    <div class="stats-row" id="weeklyStats"></div>
  </div>

  <div class="view" id="view-monthly">
    <div class="month-header">
      <button class="month-nav-btn" id="monthPrev">‹</button>
      <div class="month-title" id="monthLabel"></div>
      <button class="month-nav-btn" id="monthNext">›</button>
    </div>
    <div id="monthlyContent"></div>
  </div>

  <div class="view" id="view-yearly">
    <div style="margin-bottom:1.5rem">
      <div class="section-label" style="margin-bottom:0.3rem">Year at a Glance</div>
      <div style="font-size:1.1rem;font-weight:700;" id="yearLabel"></div>
    </div>
    <div id="yearlyContent"></div>
  </div>
</main>

<!-- MANAGE MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Manage Goals</h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <ul class="goal-list" id="goalList"></ul>
    <div id="editFormContainer"></div>
    <div id="addFormContainer">
      <div class="section-label">Add New Goal</div>
      <div class="add-goal-form">
        <div class="add-goal-row">
          <input class="goal-input emoji-input" id="emojiInput" maxlength="2" placeholder="🎯">
          <input class="goal-input" id="goalNameInput" placeholder="Goal name…" maxlength="30">
        </div>
        <div>
          <label class="form-label">Colour</label>
          <div class="color-swatches" id="colorSwatches"></div>
        </div>
        <div class="freq-selector">
          <label class="form-label">Frequency</label>
          <div class="freq-options" id="freqOptions">
            <div class="freq-opt selected" data-freq="daily">Every day</div>
            <div class="freq-opt" data-freq="custom">Custom…</div>
          </div>
          <div id="freqCustomRow" class="freq-custom-row" style="display:none">
            <input class="goal-input freq-num-input" id="freqNum" type="number" min="1" max="31" value="2">
            <span style="color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:0.75rem">times per</span>
            <select class="freq-unit-select" id="freqUnit">
              <option value="week">week</option>
              <option value="month">month</option>
            </select>
          </div>
          <div class="freq-preview" id="freqPreview">Target: every day</div>
        </div>
        <div class="form-btn-row">
          <button class="add-btn" id="addGoalBtn">Add Goal</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const COLORS = ['#00f5a0','#00d4ff','#ff6b35','#f7c948','#c77dff','#ff4d6d','#4af7c4','#ffb347','#f06fea','#60a5fa'];

// ── DATA ─────────────────────────────────────────────────────────────────────
function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem('pulse_v3') || '{}');
    return { goals: d.goals || [], log: d.log || {} };
  } catch(e) { return { goals: [], log: {} }; }
}
function saveData(d) { localStorage.setItem('pulse_v3', JSON.stringify(d)); }

let data = loadData();
if (!data.goals.length) {
  data.goals = [
    { id:'g1', name:'Exercise', emoji:'🏃', color:'#00f5a0', freq:'daily' },
    { id:'g2', name:'Read', emoji:'📖', color:'#00d4ff', freq:'daily' },
    { id:'g3', name:'Meditate', emoji:'🧘', color:'#c77dff', freq:'3xweek', freqN:3, freqUnit:'week' },
  ];
  saveData(data);
}

// ── DATE HELPERS ─────────────────────────────────────────────────────────────
function fmtDate(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayStr() { return fmtDate(new Date()); }
function isFuture(s) { return s > todayStr(); }
function isToday(s) { return s === todayStr(); }
function hexRgb(hex) { return {r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)}; }

// ── LOG HELPERS ──────────────────────────────────────────────────────────────
function isLogged(dateStr, goalId) { return !!(data.log[dateStr]?.[goalId]); }
function toggleLog(dateStr, goalId) {
  if (!data.log[dateStr]) data.log[dateStr] = {};
  data.log[dateStr][goalId] = !data.log[dateStr][goalId];
  saveData(data);
}

// ── FREQUENCY HELPERS ─────────────────────────────────────────────────────────
// freq object: { type:'daily' } | { type:'week', n:2 } | { type:'month', n:5 }
function goalFreq(g) {
  if (!g.freq || g.freq === 'daily') return { type:'daily' };
  // stored as freqN + freqUnit
  return { type: g.freqUnit || 'week', n: g.freqN || 1 };
}

function freqLabel(g) {
  const f = goalFreq(g);
  if (f.type === 'daily') return 'Every day';
  return `${f.n}× per ${f.type}`;
}

function freqShort(g) {
  const f = goalFreq(g);
  if (f.type === 'daily') return 'daily';
  return `${f.n}/${f.type[0]}`;
}

// Given a week's worth of dateStrings and a goal, compute % toward target
function weekCompletionPct(weekDates, g) {
  const f = goalFreq(g);
  const pastDates = weekDates.filter(ds => !isFuture(ds));
  const doneCount = weekDates.filter(ds => !isFuture(ds) && isLogged(ds, g.id)).length;
  if (f.type === 'daily') {
    return pastDates.length ? Math.round(doneCount / pastDates.length * 100) : 0;
  } else if (f.type === 'week') {
    return Math.min(100, Math.round(doneCount / f.n * 100));
  } else { // month - for weekly view, show week contribution
    return Math.min(100, Math.round(doneCount / f.n * 100));
  }
}

// For monthly view: compute expected and achieved for the full month
function monthCompletion(year, month, g) {
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const f = goalFreq(g);
  const today = todayStr();
  let done = 0;
  const allDays = [];
  for (let d=1;d<=daysInMonth;d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    allDays.push(ds);
    if (!isFuture(ds) && isLogged(ds, g.id)) done++;
  }
  const pastDays = allDays.filter(ds => !isFuture(ds)).length;
  if (f.type === 'daily') {
    const target = pastDays;
    return { done, target, pct: target ? Math.min(100, Math.round(done/target*100)) : 0 };
  } else if (f.type === 'week') {
    // how many weeks (partial counts) have passed
    const weeksElapsed = pastDays / 7;
    const target = Math.round(f.n * weeksElapsed);
    return { done, target: Math.max(1, target), pct: target ? Math.min(100, Math.round(done/Math.max(1,target)*100)) : 0 };
  } else { // month
    const pct = Math.min(100, Math.round(done / f.n * 100));
    return { done, target: f.n, pct };
  }
}

// For yearly view
function yearCompletion(year, g) {
  const f = goalFreq(g);
  const today = todayStr();
  const allDays = [];
  for (let m=0;m<12;m++) {
    const dim = new Date(year,m+1,0).getDate();
    for (let d=1;d<=dim;d++) allDays.push(`${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }
  const pastDays = allDays.filter(ds => !isFuture(ds));
  const done = pastDays.filter(ds => isLogged(ds,g.id)).length;
  if (f.type === 'daily') {
    return { done, target: pastDays.length, pct: pastDays.length ? Math.min(100,Math.round(done/pastDays.length*100)) : 0 };
  } else if (f.type === 'week') {
    const weeksElapsed = pastDays.length / 7;
    const target = Math.round(f.n * weeksElapsed);
    return { done, target: Math.max(1,target), pct: target ? Math.min(100,Math.round(done/Math.max(1,target)*100)) : 0 };
  } else {
    const monthsElapsed = pastDays.length / 30.44;
    const target = Math.round(f.n * monthsElapsed);
    return { done, target: Math.max(1,target), pct: target ? Math.min(100,Math.round(done/Math.max(1,target)*100)) : 0 };
  }
}

// ── DAILY VIEW ────────────────────────────────────────────────────────────────
function renderDaily() {
  const now = new Date();
  document.getElementById('dayNum').textContent = now.getDate();
  document.getElementById('weekdayName').textContent = now.toLocaleDateString('en-GB',{weekday:'long'}).toUpperCase();
  document.getElementById('monthYear').textContent = now.toLocaleDateString('en-GB',{month:'long',year:'numeric'});

  const grid = document.getElementById('dailyGrid');
  grid.innerHTML = '';
  if (!data.goals.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎯</div><div class="empty-title">No goals yet</div><div class="empty-sub">Click "+ Goals" to get started</div></div>`;
    document.getElementById('dailyStats').innerHTML = '';
    return;
  }

  const dateStr = todayStr();
  let done = 0;
  data.goals.forEach(g => {
    const logged = isLogged(dateStr, g.id);
    if (logged) done++;
    const rgb = hexRgb(g.color);
    const tile = document.createElement('div');
    tile.className = 'goal-tile' + (logged ? ' done' : '');
    tile.style.background = logged ? `linear-gradient(135deg,${g.color},rgba(${rgb.r},${rgb.g},${rgb.b},0.75))` : 'var(--bg2)';
    if (logged) tile.style.boxShadow = `0 4px 24px rgba(${rgb.r},${rgb.g},${rgb.b},0.35)`;
    tile.innerHTML = `
      <div>
        <span class="goal-tile-icon">${g.emoji||'🎯'}</span>
        <div class="goal-tile-name">${g.name}</div>
        <div class="goal-tile-freq">${freqLabel(g)}</div>
      </div>
      <div class="goal-tile-status">${logged ? '✓ DONE' : 'TAP TO LOG'}</div>`;
    tile.addEventListener('click', () => {
      toggleLog(dateStr, g.id);
      tile.classList.add('popping');
      tile.addEventListener('animationend', () => tile.classList.remove('popping'), {once:true});
      renderDaily();
    });
    grid.appendChild(tile);
  });

  // streak (any goal done)
  let streak = 0;
  const d = new Date();
  for (let i=0;i<365;i++) {
    const s = fmtDate(d);
    if (data.goals.some(g => (data.log[s]||{})[g.id])) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  const pct = Math.round(done/data.goals.length*100);
  document.getElementById('dailyStats').innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:var(--g0)">${done}</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--g2)">${data.goals.length-done}</div><div class="stat-label">Remaining</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--g4)">${streak}</div><div class="stat-label">Day Streak</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--g3)">${pct}%</div><div class="stat-label">Today's Rate</div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%;background:var(--g3)"></div></div></div>`;
}

// ── WEEKLY VIEW ───────────────────────────────────────────────────────────────
function getWeekDates() {
  const today = new Date();
  const mon = new Date(today);
  mon.setDate(today.getDate() - ((today.getDay()+6)%7));
  return Array.from({length:7}, (_,i) => { const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function renderWeekly() {
  const days = getWeekDates();
  const dayStrs = days.map(fmtDate);
  const DAY_NAMES = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
  const today = todayStr();

  const first=days[0], last=days[6];
  document.getElementById('weekRangeLabel').textContent =
    first.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+last.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});

  const table = document.getElementById('weekTable');
  if (!data.goals.length) {
    table.innerHTML = '<tr><td style="padding:2rem;color:var(--text-faint);font-size:0.85rem;font-family:\'JetBrains Mono\',monospace">Add goals first.</td></tr>';
    document.getElementById('weeklyStats').innerHTML = '';
    return;
  }

  let html = '<thead><tr><th class="goal-col">Goal</th>';
  days.forEach((d,i) => {
    const isT = fmtDate(d) === today;
    html += `<th class="${isT?'today-th':''}"><div>${DAY_NAMES[i]}</div><div style="color:var(--text-faint);font-size:0.85em;margin-top:2px">${d.getDate()}</div></th>`;
  });
  html += '<th style="min-width:120px;text-align:left;padding-left:0.8rem">Progress</th></tr></thead><tbody>';

  let totalWeightedPct = 0;
  data.goals.forEach(g => {
    const rgb = hexRgb(g.color);
    const f = goalFreq(g);
    html += `<tr>
      <td class="goal-label">
        <span style="margin-right:0.4rem">${g.emoji||'🎯'}</span>${g.name}
        <div class="goal-label-sub">${freqLabel(g)}</div>
      </td>`;
    days.forEach(d => {
      const ds = fmtDate(d);
      const logged = isLogged(ds, g.id);
      const fut = isFuture(ds);
      const isT = ds === today;
      let cls = 'week-cell';
      if (logged) cls += ' done';
      if (isT && !logged) cls += ' today-col';
      if (fut) cls += ' future';
      const bg = logged ? `background:${g.color};box-shadow:0 2px 10px rgba(${rgb.r},${rgb.g},${rgb.b},0.4);` : '';
      const attr = !fut ? `data-date="${ds}" data-goal="${g.id}"` : '';
      html += `<td><div class="${cls}" style="${bg}" ${attr}>${logged?'✓':''}</div></td>`;
    });

    // Progress column — pips for custom freq, bar for daily
    const doneDays = dayStrs.filter(ds => !isFuture(ds) && isLogged(ds,g.id)).length;
    const weekPct = weekCompletionPct(dayStrs, g);
    totalWeightedPct += weekPct;

    if (f.type === 'daily') {
      const pastCount = dayStrs.filter(ds => !isFuture(ds)).length;
      html += `<td style="text-align:left;padding-left:0.8rem;min-width:120px">
        <div style="display:flex;align-items:center;gap:0.5rem">
          <div class="progress-bar-wrap" style="flex:1;height:6px"><div class="progress-bar-fill" style="width:${weekPct}%;background:${g.color}"></div></div>
          <span style="font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--text-dim);white-space:nowrap">${doneDays}/${pastCount}</span>
        </div>
      </td>`;
    } else {
      const target = f.n;
      let pips = '';
      for (let i=0;i<target;i++) {
        const filled = i < doneDays;
        pips += `<div class="week-freq-pip${filled?' filled':''}" style="${filled?`background:${g.color};box-shadow:0 0 6px rgba(${rgb.r},${rgb.g},${rgb.b},0.5);`:''}"></div>`;
      }
      html += `<td style="text-align:left;padding-left:0.8rem">
        <div class="week-freq-bar">
          <div class="week-freq-pips">${pips}</div>
          <span class="week-freq-label">${doneDays}/${target}</span>
        </div>
      </td>`;
    }
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;

  table.querySelectorAll('.week-cell[data-date]').forEach(cell => {
    cell.addEventListener('click', () => {
      toggleLog(cell.dataset.date, cell.dataset.goal);
      renderWeekly();
      if (isToday(cell.dataset.date)) renderDaily();
    });
  });

  const avgPct = data.goals.length ? Math.round(totalWeightedPct / data.goals.length) : 0;
  const totalHits = dayStrs.reduce((acc, ds) => acc + data.goals.filter(g => !isFuture(ds) && isLogged(ds,g.id)).length, 0);
  document.getElementById('weeklyStats').innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:var(--g0)">${totalHits}</div><div class="stat-label">Total Hits</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--g3)">${avgPct}%</div><div class="stat-label">Avg Completion</div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${avgPct}%;background:var(--g3)"></div></div></div>`;
}

// ── MONTHLY VIEW ──────────────────────────────────────────────────────────────
let monthOffset = 0;

function renderMonthly() {
  const now = new Date();
  const ref = new Date(now.getFullYear(), now.getMonth()+monthOffset, 1);
  const year = ref.getFullYear(), month = ref.getMonth();
  document.getElementById('monthLabel').textContent = ref.toLocaleDateString('en-GB',{month:'long',year:'numeric'}).toUpperCase();
  document.getElementById('monthNext').style.opacity = monthOffset >= 0 ? '0.3' : '1';
  document.getElementById('monthNext').disabled = monthOffset >= 0;

  const daysInMonth = new Date(year,month+1,0).getDate();
  const firstDow = (new Date(year,month,1).getDay()+6)%7;
  const today = todayStr();
  const DAY_HDRS = ['M','T','W','T','F','S','S'];

  if (!data.goals.length) {
    document.getElementById('monthlyContent').innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">No goals yet</div></div>';
    return;
  }

  let html = '';
  data.goals.forEach(g => {
    const rgb = hexRgb(g.color);
    const { done, target, pct } = monthCompletion(year, month, g);
    const f = goalFreq(g);

    html += `<div class="goal-month-block">
      <div class="goal-section-title">
        <span>${g.emoji||'🎯'}</span><span>${g.name}</span>
        <span class="freq-badge">${freqLabel(g)}</span>
        <span class="yearly-stat">${done}/${target} — ${pct}%</span>
      </div>
      <div class="month-cal">`;
    DAY_HDRS.forEach(h => html += `<div class="month-day-hdr">${h}</div>`);
    for (let i=0;i<firstDow;i++) html += `<div class="month-cell empty"></div>`;
    for (let day=1;day<=daysInMonth;day++) {
      const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const logged = isLogged(ds, g.id);
      const fut = isFuture(ds);
      const isT = ds === today;
      let cls = 'month-cell' + (logged?' done':'') + (fut?' future':'') + (isT?' today-cell':'');
      const bg = logged ? `background:${g.color};box-shadow:0 1px 8px rgba(${rgb.r},${rgb.g},${rgb.b},0.35);` : '';
      html += `<div class="${cls}" style="${bg}">${day}</div>`;
    }
    html += `</div>`;
    html += `<div style="display:flex;align-items:center;gap:1rem;margin-top:0.5rem">
      <div class="progress-bar-wrap" style="flex:1"><div class="progress-bar-fill" style="width:${pct}%;background:${g.color}"></div></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-dim);min-width:90px">${done}/${target} (${pct}%)</div>
    </div></div>`;
  });
  document.getElementById('monthlyContent').innerHTML = html;
}

document.getElementById('monthPrev').addEventListener('click', () => { monthOffset--; renderMonthly(); });
document.getElementById('monthNext').addEventListener('click', () => { if(monthOffset<0){monthOffset++;renderMonthly();} });

// ── YEARLY VIEW ───────────────────────────────────────────────────────────────
function renderYearly() {
  const year = new Date().getFullYear();
  document.getElementById('yearLabel').textContent = year;
  if (!data.goals.length) {
    document.getElementById('yearlyContent').innerHTML = '<div class="empty-state"><div class="empty-icon">📆</div><div class="empty-title">No goals yet</div></div>';
    return;
  }
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const allDays = [];
  for (let m=0;m<12;m++) {
    const dim = new Date(year,m+1,0).getDate();
    for (let d=1;d<=dim;d++) allDays.push(`${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }

  let html = '';
  data.goals.forEach(g => {
    const rgb = hexRgb(g.color);
    const { done, target, pct } = yearCompletion(year, g);
    const firstDow = (new Date(year,0,1).getDay()+6)%7;

    html += `<div class="yearly-goal-section">
      <div class="yearly-goal-title">
        <span>${g.emoji||'🎯'}</span><span>${g.name}</span>
        <span class="freq-badge">${freqLabel(g)}</span>
        <span class="yearly-stat">${done}/${target} — ${pct}%</span>
      </div>`;

    // Month labels
    html += `<div style="display:flex;gap:0;margin-bottom:3px;overflow:hidden;font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:var(--text-faint);">`;
    MONTHS.forEach((mn,mi) => {
      const dayOfYear = Math.round((new Date(year,mi,1) - new Date(year,0,1))/86400000);
      const colStart = Math.floor((firstDow+dayOfYear)/7);
      const dim = new Date(year,mi+1,0).getDate();
      const colSpan = Math.ceil((firstDow+dayOfYear+dim)/7) - colStart;
      html += `<div style="flex:${colSpan};min-width:0;padding-left:2px;overflow:hidden">${mn}</div>`;
    });
    html += `</div><div class="year-grid" style="grid-template-rows:repeat(7,12px);grid-auto-columns:12px;">`;
    for (let i=0;i<firstDow;i++) html += `<div class="year-cell" style="opacity:0"></div>`;
    allDays.forEach(ds => {
      const logged = isLogged(ds,g.id);
      const fut = isFuture(ds);
      const isT = ds === todayStr();
      const label = new Date(ds+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
      let bg = fut ? 'var(--bg3)' : (logged ? g.color : `rgba(${rgb.r},${rgb.g},${rgb.b},0.10)`);
      const sh = logged&&!fut ? `box-shadow:0 0 4px rgba(${rgb.r},${rgb.g},${rgb.b},0.5);` : '';
      html += `<div class="year-cell${isT?' today-year':''}" style="background:${bg};${sh}" data-tip="${label}${logged?' ✓':''}"></div>`;
    });
    html += `</div>`;
    html += `<div class="progress-bar-wrap" style="margin-top:0.5rem;margin-bottom:0.3rem"><div class="progress-bar-fill" style="width:${pct}%;background:${g.color}"></div></div>`;
    html += `</div>`;
  });
  document.getElementById('yearlyContent').innerHTML = html;
}

    });
  });

  document.getElementById('editFreqOptions').querySelectorAll('.freq-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      editFreqType = opt.dataset.freq;
      document.getElementById('editFreqOptions').querySelectorAll('.freq-opt').forEach(o => o.classList.toggle('selected', o===opt));
      document.getElementById('editFreqCustomRow').style.display = editFreqType==='custom'?'flex':'none';
      updateEditPreview();
    });
  });
  document.getElementById('editFreqNum')?.addEventListener('input', updateEditPreview);
  document.getElementById('editFreqUnit')?.addEventListener('change', updateEditPreview);

  document.getElementById('saveEditBtn').addEventListener('click', () => {
    const name = document.getElementById('editName').value.trim();
    const emoji = document.getElementById('editEmoji').value.trim() || '🎯';
    if (!name) { document.getElementById('editName').focus(); return; }
    const idx = data.goals.findIndex(x => x.id === id);
    if (idx === -1) return;
    const n = parseInt(document.getElementById('editFreqNum')?.value)||1;
    const unit = document.getElementById('editFreqUnit')?.value||'week';
    data.goals[idx] = {
      ...data.goals[idx],
      name, emoji, color: editColor,
      freq: editFreqType === 'daily' ? 'daily' : `${n}x${unit}`,
      freqN: editFreqType === 'daily' ? undefined : n,
      freqUnit: editFreqType === 'daily' ? undefined : unit,
    };
    saveData(data);
    closeEditForm();
    renderGoalList();
    renderAll();
  });

  document.getElementById('cancelEditBtn').addEventListener('click', closeEditForm);
}

function closeEditForm() {
  editingGoalId = null;
  document.getElementById('editFormContainer').innerHTML = '';
  document.getElementById('addFormContainer').style.display = 'block';
}

// ── ADD FORM ──────────────────────────────────────────────────────────────────
function renderColorSwatches() {
  const wrap = document.getElementById('colorSwatches');
  if (!wrap) return;
  wrap.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch'+(c===selectedColor?' selected':'');
    sw.style.background = c;
    sw.addEventListener('click', () => { selectedColor=c; renderColorSwatches(); });
    wrap.appendChild(sw);
  });
}

function updateAddFreqPreview() {
  const isCustom = selectedFreq === 'custom';
  const n = parseInt(document.getElementById('freqNum')?.value)||1;
  const unit = document.getElementById('freqUnit')?.value||'week';
  document.getElementById('freqPreview').textContent = isCustom ? `Target: ${n}× per ${unit}` : 'Target: every day';
}

document.getElementById('freqOptions').querySelectorAll('.freq-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    selectedFreq = opt.dataset.freq;
    document.querySelectorAll('#freqOptions .freq-opt').forEach(o => o.classList.toggle('selected', o===opt));
    document.getElementById('freqCustomRow').style.display = selectedFreq==='custom'?'flex':'none';
    updateAddFreqPreview();
  });
});
document.getElementById('freqNum').addEventListener('input', updateAddFreqPreview);
document.getElementById('freqUnit').addEventListener('change', updateAddFreqPreview);

document.getElementById('addGoalBtn').addEventListener('click', () => {
  const name = document.getElementById('goalNameInput').value.trim();
  const emoji = document.getElementById('emojiInput').value.trim() || '🎯';
  if (!name) { document.getElementById('goalNameInput').focus(); return; }
  const n = parseInt(document.getElementById('freqNum').value)||1;
  const unit = document.getElementById('freqUnit').value||'week';
  data.goals.push({
    id: 'g'+Date.now(), name, emoji, color: selectedColor,
    freq: selectedFreq === 'daily' ? 'daily' : `${n}x${unit}`,
    freqN: selectedFreq === 'daily' ? undefined : n,
    freqUnit: selectedFreq === 'daily' ? undefined : unit,
  });
  saveData(data);
  document.getElementById('goalNameInput').value = '';
  document.getElementById('emojiInput').value = '';
  selectedColor = COLORS[Math.floor(Math.random()*COLORS.length)];
  renderColorSwatches();
  renderGoalList();
  renderAll();
});
document.getElementById('goalNameInput').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('addGoalBtn').click(); });

// ── MODAL OPEN/CLOSE ──────────────────────────────────────────────────────────
document.getElementById('manageBtn').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.add('open');
  closeEditForm();
  renderGoalList();
  renderColorSwatches();
});
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
  closeEditForm();
});
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) { e.currentTarget.classList.remove('open'); closeEditForm(); }
});

// ── NAV ───────────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-'+tab.dataset.view).classList.add('active');
    const v = tab.dataset.view;
    if (v==='weekly') renderWeekly();
    if (v==='monthly') renderMonthly();
    if (v==='yearly') renderYearly();
  });
});

// ── INIT ──────────────────────────────────────────────────────────────────────
function renderAll() { renderDaily(); renderWeekly(); renderMonthly(); renderYearly(); }
renderAll();
renderColorSwatches();
updateAddFreqPreview();
</script>
</body>
</html>
